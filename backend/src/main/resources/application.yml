spring:
  application:
    name: chinese-learning-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/chinese_app}
    username: ${DB_USER:chinese}
    password: ${DB_PASSWORD:chinese}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://kanhim0105.com,https://www.kanhim0105.com}
  letter:
    allowed-emails: ${LETTER_ALLOWED_EMAILS:nguoiyeukimhan}
  hsk:
    # Directory holding the HSK1..HSK4 study-material sub-folders (PDF books +
    # HSK 4 listening MP3s). Large scanned files: served from the filesystem,
    # never bundled into the JAR. Defaults to the repo-level TaiLieu folder.
    materials-dir: ${HSK_MATERIALS_DIR:../TaiLieu}
  llm:
    provider: ${LLM_PROVIDER:deepseek}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    api-key: ${LLM_API_KEY:}
    chat-model: ${LLM_CHAT_MODEL:deepseek-v4-flash}
    reasoning-model: ${LLM_REASONING_MODEL:deepseek-v4-pro}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
  tts:
    base-url: ${TTS_BASE_URL:http://localhost:8001}
    voice: ${TTS_VOICE:zh-CN-XiaoxiaoNeural}
    storage-dir: ${AUDIO_STORAGE_DIR:/data/audio}
  azure-speech:
    key: ${AZURE_SPEECH_KEY:}
    region: ${AZURE_SPEECH_REGION:southeastasia}
    language: zh-CN
  corpus:
    # Round 26 Phase 0 tone-corpus collection. Off by default; even when enabled,
    # audio is stored only for attempts where the learner explicitly consented.
    enabled: ${CORPUS_ENABLED:false}
    storage-dir: ${CORPUS_STORAGE_DIR:/data/corpus}
    retention-days: ${CORPUS_RETENTION_DAYS:90}
  auth:
    jwt:
      secret: ${JWT_SECRET:}
      expiry-days: ${JWT_EXPIRY_DAYS:7}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    single-user:
      enabled: ${SINGLE_USER_ENABLED:false}
      username: ${SINGLE_USER_USERNAME:}
      password: ${SINGLE_USER_PASSWORD:}
      display-name: ${SINGLE_USER_DISPLAY_NAME:Learner}

logging:
  level:
    com.chineseapp: INFO
    org.springframework.web: INFO

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chinese_app
      POSTGRES_USER: chinese
      POSTGRES_PASSWORD: chinese
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinese -d chinese_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  tts-service:
    build: ./tts-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      tts-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/chinese_app
      DB_USER: chinese
      DB_PASSWORD: chinese
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-v4-flash}
      TTS_BASE_URL: http://tts-service:8001
      TTS_VOICE: zh-CN-XiaoxiaoNeural
      AUDIO_STORAGE_DIR: /data/audio
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southeastasia}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    volumes:
      - audio_data:/data/audio
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        # Vite inlines env at build time, so the client id is passed as a build arg.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  audio_data:

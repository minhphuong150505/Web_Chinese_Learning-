services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chinese_app
      POSTGRES_USER: chinese
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chinese}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinese -d chinese_app"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tts-service:
    build: ./tts-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      tts-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx768m}
      DB_URL: jdbc:postgresql://postgres:5432/chinese_app
      DB_USER: chinese
      DB_PASSWORD: ${DB_PASSWORD:-chinese}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-v4-flash}
      TTS_BASE_URL: http://tts-service:8001
      TTS_VOICE: zh-CN-XiaoxiaoNeural
      AUDIO_STORAGE_DIR: /data/audio
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-southeastasia}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,https://kanhim0105.com,https://www.kanhim0105.com}
      HSK_MATERIALS_DIR: /data/hsk
      LETTER_ALLOWED_EMAILS: ${LETTER_ALLOWED_EMAILS:-nguoiyeukimhan}
      SINGLE_USER_ENABLED: ${SINGLE_USER_ENABLED:-false}
      SINGLE_USER_USERNAME: ${SINGLE_USER_USERNAME:-}
      SINGLE_USER_PASSWORD: ${SINGLE_USER_PASSWORD:-}
      SINGLE_USER_DISPLAY_NAME: ${SINGLE_USER_DISPLAY_NAME:-Learner}
    volumes:
      - audio_data:/data/audio
      - ./TaiLieu:/data/hsk:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_LETTER_ALLOWED_EMAILS: ${VITE_LETTER_ALLOWED_EMAILS:-nguoiyeukimhan}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - frontend
    environment:
      DOMAIN: ${DOMAIN:-kanhim0105.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  audio_data:
  caddy_data:
  caddy_config:
